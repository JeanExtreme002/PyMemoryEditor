# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python Package

on:
  # `push` restricted to `main` so feature branches only run via `pull_request`.
  # Otherwise every push to a branch with an open PR would trigger the workflow
  # twice (once for `push`, once for `pull_request`) — doubling CI cost and
  # latency for no benefit.
  push:
    branches: [main]
  pull_request:
  # Allow re-running the workflow without an empty push (handy after the
  # workflow gets `disabled_inactivity` after 60 days idle).
  workflow_dispatch:
  schedule:
    - cron:  '0 0 */7 * *'

# Cancel an in-flight run when a newer commit lands on the same ref. Keeps the
# queue lean and stops stale runs from blocking the merge button.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install lint deps
      run: |
        python -m pip install --upgrade pip
        pip install flake8
    - name: Lint
      run: |
        flake8 PyMemoryEditor tests

  type-check:
    needs: lint
    runs-on: ubuntu-latest
    # Informational while pre-existing type debt is being paid down. Surfaces
    # regressions in PR diffs without blocking merges. Flip to required once
    # the existing errors are addressed.
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dev deps
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    - name: Run mypy
      run: |
        mypy PyMemoryEditor

  build:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
        os:
          - ubuntu-latest
          - windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    - name: Test with pytest
      run: |
        pytest tests -v -s -x --cov=PyMemoryEditor --cov-report=term

  # macOS is split out and only runs on push-to-main / weekly cron / manual
  # dispatch — NEVER on `pull_request`. GitHub-hosted macOS runner pools are
  # frequently congested (jobs sit in queue for 30+ minutes without acquiring
  # a runner), which would stall every PR for hours waiting on macOS to
  # validate something that's already covered by the Mach API surface tests.
  # Local self-process tests run as part of dev validation; this CI job is
  # the safety net for that.
  build-macos:
    needs: lint
    if: github.event_name != 'pull_request'
    runs-on: macos-13
    timeout-minutes: 25
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    - name: Test with pytest
      run: |
        pytest tests -v -s -x --cov=PyMemoryEditor --cov-report=term
